<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3DP-Mol* – Mol* Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- Mol* CSS -->
  <link rel="stylesheet" href="build/viewer/molstar.css" />
  <!-- Mol* script (global) -->
  <script src="build/viewer/molstar.js"></script>
  <!-- Simple favicon to avoid 404 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'></svg>" />
  <!-- Import map to resolve bare 'three' imports from JSM exporters -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div class="sidebar">
    <header class="header">
      <h1 class="title">3DP-Mol*</h1>
      <p class="subtitle">Upload molecular files, calculate planning support struts, and export 3D-printable meshes.</p>
    </header>

    <section class="upload-panel glass">
      <div class="section-title">Upload Structure</div>
      <input type="file" id="file-input" accept=".pdb,.cif,.mmcif,.bcif,.sdf,.mol2,.xyz" />
      <p class="note">Formats: PDB, mmCIF, BinaryCIF, SDF, MOL2, XYZ (max 100 MB)</p>
    </section>

    <section class="import-panel glass">
      <div class="section-title">Import from Database</div>
      <div style="display: flex; flex-direction: column; gap: 0.75rem;">
        <select id="db-select" class="db-select">
          <option value="pdb">PDB (PDBe-KB)</option>
          <option value="afdb">AlphaFold DB (AFDB)</option>
          <option value="esmatlas">ESM Metagenomic Atlas</option>
        </select>
        <div class="search-container" style="position: relative;">
          <input type="text" id="db-input" placeholder="Enter PDB ID (e.g., 1tqn)" autocomplete="off" />
          <div id="autocomplete-list" class="autocomplete-items" style="display: none;"></div>
        </div>
        <button id="import-btn" class="export-btn" style="width: 100%;">Load Structure</button>
        <div id="search-results" class="search-results" style="display: none;"></div>
      </div>
    </section>

    <section class="export-panel glass" style="display:none;">
      <div class="section-title">Direct Web Exporter</div>
      <button id="export-stl" class="export-btn" disabled>Download STL</button>
      <button id="export-obj" class="export-btn" disabled>Download OBJ</button>
      <button id="export-glb" class="export-btn" disabled>Download GLB</button>
    </section>

    <footer class="footer">
      <p>© 2026 3DP-Mol* – Built with <a href="https://molstar.org" target="_blank">Mol*</a></p>
    </footer>
  </div>

  <main id="viewer" class="viewer"></main>

  <!-- Viewer logic as ES module (imports Three.js only) -->
  <script type="module" src="assets/js/viewer.js"></script>
</body>
</html>
